# Session 7: Pod Kill Chaos Experiments
# Tests system resilience by killing pods and observing recovery behavior.
#
# Prerequisites:
#   1. Chaos Mesh installed: helm install chaos-mesh chaos-mesh/chaos-mesh -n chaos-mesh --create-namespace
#   2. Create target namespace and workload:
#      kubectl create namespace chaos-testing
#      kubectl create deployment api-service --image=nginx:alpine --replicas=3 -n chaos-testing
#      kubectl label deployment api-service app=api-service -n chaos-testing
#      kubectl wait --for=condition=available deployment/api-service -n chaos-testing --timeout=60s

---
# Experiment 1: Kill a single pod (simplest test — does the pod restart?)
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-experiment
  namespace: chaos-testing
spec:
  action: pod-kill
  mode: one
  duration: "5m"
  selector:
    namespaces:
      - chaos-testing
    labelSelectors:
      app: api-service

---
# Experiment 2: Kill 50% of pods (stress test — can the service survive partial outage?)
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-advanced
  namespace: chaos-testing
spec:
  action: pod-kill
  mode: fixed-percent
  value: "50"
  duration: "10m"
  selector:
    namespaces:
      - chaos-testing
    labelSelectors:
      app: api-service

---
# Schedule: Repeat pod-kill on a cron (for ongoing resilience testing)
# Use Chaos Mesh's Schedule CRD instead of the deprecated spec.scheduler field
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: pod-kill-schedule
  namespace: chaos-testing
spec:
  schedule: "0 2 * * *"
  type: PodChaos
  concurrencyPolicy: Forbid
  podChaos:
    action: pod-kill
    mode: one
    duration: "5m"
    selector:
      namespaces:
        - chaos-testing
      labelSelectors:
        app: api-service

---
# Workflow: Chain multiple experiments in sequence
# Kill 1 pod → kill 50% → verify all pods recover
apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: pod-kill-workflow
  namespace: chaos-testing
spec:
  entry: pod-kill-chain
  templates:
    - name: pod-kill-chain
      templateType: Serial
      children:
        - slow-pod-kill
        - aggressive-pod-kill

    - name: slow-pod-kill
      templateType: PodChaos
      deadline: 5m
      podChaos:
        action: pod-kill
        duration: "2m"
        selector:
          namespaces:
            - chaos-testing
          labelSelectors:
            app: api-service
        mode: one

    - name: aggressive-pod-kill
      templateType: PodChaos
      deadline: 5m
      podChaos:
        action: pod-kill
        duration: "3m"
        selector:
          namespaces:
            - chaos-testing
          labelSelectors:
            app: api-service
        mode: fixed-percent
        value: "50"

---
# Prometheus alerts for chaos experiments
apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-kill-alerts
  namespace: chaos-testing
data:
  alerts.yaml: |
    groups:
    - name: pod-kill-experiment
      rules:
      - alert: HighPodRestartRate
        expr: |
          rate(kube_pod_container_status_restarts_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          experiment: pod-kill
        annotations:
          summary: "High pod restart rate during experiment"
          description: "Restart rate: {{ $value | humanize }}/sec"
